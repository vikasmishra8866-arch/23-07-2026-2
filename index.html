<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vehicle Details Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
      letter-spacing: 0.5px;
    }

    .search-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(15, 23, 42, 0.6);
      color: #fff;
      font-size: 1rem;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: #38bdf8;
    }

    .btn {
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #0284c7;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #0369a1;
    }

    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .result-card {
      display: none;
      margin-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      font-size: 0.95rem;
    }

    .label {
      color: #94a3b8;
    }

    .value {
      font-weight: 600;
      color: #f8fafc;
      text-align: right;
      max-width: 65%;
      word-break: break-word;
    }

    .badge-success {
      color: #4ade80;
    }

    .status-msg {
      text-align: center;
      margin-top: 15px;
      font-size: 0.95rem;
      color: #f87171;
    }

    .loader {
      display: none;
      text-align: center;
      margin-top: 15px;
      color: #38bdf8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">🚗 VEHICLE DETAILS PORTAL</div>
    
    <div class="search-box">
      <input type="text" id="vehicleNumber" placeholder="Gadi Number (e.g. GJ05BY2328)" maxlength="13" />
      <button class="btn" id="searchBtn" onclick="fetchVehicleDetails()">Search Details</button>
    </div>

    <div class="loader" id="loader">🔍 Details Fetch Ho Rahi Hain, Kripya Wait Karein...</div>
    <div class="status-msg" id="statusMsg"></div>

    <div class="result-card" id="resultCard">
      <div class="info-row"><span class="label">Reg No</span><span class="value" id="resRegNo">-</span></div>
      <div class="info-row"><span class="label">Owner Name</span><span class="value" id="resOwner">-</span></div>
      <div class="info-row"><span class="label">Make / Model</span><span class="value" id="resModel">-</span></div>
      <div class="info-row"><span class="label">Fuel Type</span><span class="value" id="resFuel">-</span></div>
      <div class="info-row"><span class="label">Vehicle Class</span><span class="value" id="resClass">-</span></div>
      <div class="info-row"><span class="label">Reg Date</span><span class="value" id="resRegDate">-</span></div>
      <div class="info-row"><span class="label">RTO</span><span class="value" id="resRto">-</span></div>
      <div class="info-row"><span class="label">Chassis No</span><span class="value" id="resChassis">-</span></div>
      <div class="info-row"><span class="label">Engine No</span><span class="value" id="resEngine">-</span></div>
      <div class="info-row"><span class="label">Mobile</span><span class="value badge-success" id="resMobile">-</span></div>
    </div>
  </div>

  <script>
    // Configuration: Render Backend URL
    const BASE_API_URL = "https://vahan-verify-2.onrender.com/api/vehicle-details-only";

    async function fetchVehicleDetails() {
      const inputEl = document.getElementById("vehicleNumber");
      const searchBtn = document.getElementById("searchBtn");
      const loader = document.getElementById("loader");
      const statusMsg = document.getElementById("statusMsg");
      const resultCard = document.getElementById("resultCard");

      // Reset View
      statusMsg.innerText = "";
      resultCard.style.display = "none";

      const rawInput = inputEl.value.trim();
      const cleanRegNo = rawInput.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();

      // Basic Validation
      if (!cleanRegNo || cleanRegNo.length < 7) {
        statusMsg.innerText = "⚠️ Kripya sahi gadi number enter karein (e.g. GJ05BY2328).";
        return;
      }

      // UI Loading State
      loader.style.display = "block";
      searchBtn.disabled = true;

      try {
        // Multi-segment URL (Supports both Private and Commercial Parameters)
        const requestUrl = `${BASE_API_URL}?regn_no=${cleanRegNo}&vehicle_type=COMMERCIAL&category=ALL`;

        const response = await fetch(requestUrl, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`Server returned status ${response.status}`);
        }

        const data = await response.json();

        if (data && (data.owner_name || data.maker_model || data.registration_date)) {
          // Populate Data
          document.getElementById("resRegNo").innerText = cleanRegNo;
          document.getElementById("resOwner").innerText = data.owner_name || "N/A";
          document.getElementById("resModel").innerText = data.maker_model || "N/A";
          document.getElementById("resFuel").innerText = data.fuel_type || "N/A";
          document.getElementById("resClass").innerText = data.vehicle_class || data.vehicle_category || "COMMERCIAL / PRIVATE";
          document.getElementById("resRegDate").innerText = data.registration_date || "N/A";
          document.getElementById("resRto").innerText = data.rto_name || "N/A";
          document.getElementById("resChassis").innerText = data.chassis_number || "N/A";
          document.getElementById("resEngine").innerText = data.engine_number || "N/A";
          document.getElementById("resMobile").innerText = data.mobile_number ? `${data.mobile_number} ✅` : "Not Found ❌";

          resultCard.style.display = "block";
        } else {
          statusMsg.innerText = "❌ Is vehicle number ki details nahi mil saki. Double check karein.";
        }

      } catch (err) {
        console.error(err);
        statusMsg.innerText = "❌ Server connect nahi ho saka. 20-30 seconds baad dubaara try karein.";
      } finally {
        loader.style.display = "none";
        searchBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
